<script>
let gameClear = false; // クリア判定

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "80px serif";
    ctx.fillText("どんまい 笑", canvas.width/2 - 200, canvas.height/2);
    return;
  }

  if (gameClear) {
    ctx.fillStyle = "yellow";
    ctx.font = "80px serif";
    ctx.fillText("クリア！おめでとう！", canvas.width/2 - 400, canvas.height/2);
    return;
  }

  // プレイヤー描画
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // 敵処理
  enemies.forEach(enemy => {
    if (player.x > enemy.x) enemy.x += enemy.speed;
    if (player.x < enemy.x) enemy.x -= enemy.speed;
    if (player.y > enemy.y) enemy.y += enemy.speed;
    if (player.y < enemy.y) enemy.y -= enemy.speed;

    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

    // 当たり判定
    if (
      player.x < enemy.x + enemy.size &&
      player.x + player.size > enemy.x &&
      player.y < enemy.y + enemy.size &&
      player.y + player.size > enemy.y
    ) {
      gameOver = true;
    }
  });

  // スコア描画
  ctx.fillStyle = "white";
  ctx.font = "50px Arial"; // スコア大きくした
  ctx.fillText("Score: " + score, 20, 60);

  // スコアが30に達したらクリア
  if (score >= 30) {
    gameClear = true;
  }

  requestAnimationFrame(draw);
}

document.addEventListener("touchstart", e => {
  if (!gameOver && !gameClear) { // クリア後は操作無効
    player.x = e.touches[0].clientX - player.size/2;
    player.y = e.touches[0].clientY - player.size/2;
    score++;
  }
});

draw();
</script>
